apiVersion: v1
kind: ConfigMap
metadata:
  name: wave1-api-config
  namespace: digischool
  labels:
    app: wave1-api
    app.kubernetes.io/part-of: digischool-emis
data:
  DATABASE_URL: "postgresql+psycopg2://digischool:digischool@postgres:5432/digischool"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wave1-api
  namespace: digischool
  labels:
    app: wave1-api
    app.kubernetes.io/part-of: digischool-emis
spec:
  replicas: 2
  selector:
    matchLabels:
      app: wave1-api
  template:
    metadata:
      labels:
        app: wave1-api
    spec:
      containers:
        - name: wave1-api
          image: digischool-wave1-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: wave1-api-config
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: wave1-api
  namespace: digischool
  labels:
    app: wave1-api
    app.kubernetes.io/part-of: digischool-emis
spec:
  selector:
    app: wave1-api
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wave1-api-ingress
  namespace: digischool
  labels:
    app: wave1-api
    app.kubernetes.io/part-of: digischool-emis
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: api.digischool.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: wave1-api
                port:
                  number: 8000
