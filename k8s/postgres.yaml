apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: digischool
  labels:
    app: postgres
    app.kubernetes.io/part-of: digischool-emis
type: Opaque
stringData:
  POSTGRES_USER: digischool
  POSTGRES_PASSWORD: digischool
  POSTGRES_DB: digischool
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: digischool
  labels:
    app: postgres
    app.kubernetes.io/part-of: digischool-emis
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: digischool
  labels:
    app: postgres
    app.kubernetes.io/part-of: digischool-emis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: postgres-secret
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - digischool
                - -d
                - digischool
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 20
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - digischool
                - -d
                - digischool
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: digischool
  labels:
    app: postgres
    app.kubernetes.io/part-of: digischool-emis
spec:
  selector:
    app: postgres
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
