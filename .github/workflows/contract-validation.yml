name: Contract Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-contracts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Make scripts executable
        run: chmod +x scripts/validate-*.sh

      - name: Validate OpenAPI and JSON Schemas
        run: ./scripts/validate-contracts.sh
