# DigiSchool EMIS Application Configuration
# World-Class School Management System for Kenya CBC

# ============================================================
# APPLICATION SETTINGS
# ============================================================
app.name=DigiSchool EMIS
app.version=1.0.0
app.title=DigiSchool EMIS - Kenya CBC School Management System
app.description=World-Class School Management System supporting CBC Grade 1 to Grade 13
app.country=Kenya
app.currency=KES
app.timezone=Africa/Nairobi
app.locale=en_KE

# ============================================================
# DATABASE CONFIGURATION
# Select database type: POSTGRESQL or MYSQL
# ============================================================
db.type=POSTGRESQL

# PostgreSQL Configuration
db.postgresql.host=localhost
db.postgresql.port=5432
db.postgresql.name=digischool_emis
db.postgresql.username=postgres
db.postgresql.password=postgres
db.postgresql.schema=public

# MySQL Configuration (alternative)
db.mysql.host=localhost
db.mysql.port=3306
db.mysql.name=digischool_emis
db.mysql.username=root
db.mysql.password=root

# ============================================================
# CONNECTION POOL (HikariCP)
# ============================================================
db.pool.minimum.idle=5
db.pool.maximum.size=20
db.pool.connection.timeout=30000
db.pool.idle.timeout=600000
db.pool.max.lifetime=1800000

# ============================================================
# HIBERNATE ORM
# ============================================================
hibernate.show_sql=false
hibernate.format_sql=true
hibernate.hbm2ddl.auto=validate
hibernate.batch.size=50

# ============================================================
# FLYWAY DATABASE MIGRATIONS
# ============================================================
flyway.enabled=true
flyway.locations=classpath:db/migration
flyway.baseline.on.migrate=true
flyway.validate.on.migrate=true

# ============================================================
# LOGGING
# ============================================================
logging.level=INFO
logging.file=logs/digischool-emis.log
logging.max.size=10MB
logging.max.history=30

# ============================================================
# SECURITY
# ============================================================
security.password.min.length=8
security.password.require.uppercase=true
security.password.require.lowercase=true
security.password.require.digits=true
security.password.require.special=true
security.session.timeout.minutes=30
security.max.login.attempts=5
security.lockout.duration.minutes=30

# ============================================================
# FINANCE
# ============================================================
finance.default.currency=KES
finance.late.fee.percentage=5
finance.receipt.prefix=RCPT

# ============================================================
# ATTENDANCE
# ============================================================
attendance.minimum.percentage=75
attendance.notification.enabled=true

# ============================================================
# LIBRARY
# ============================================================
library.max.borrow.days=14
library.fine.per.day=10
library.max.books.per.student=3

# ============================================================
# SMS / COMMUNICATION
# ============================================================
sms.enabled=false
sms.provider=AFRICAS_TALKING
sms.api.key=your-api-key-here
sms.sender.id=DigiSchool
email.enabled=false
email.smtp.host=smtp.gmail.com
email.smtp.port=587
email.smtp.username=your-email@gmail.com
email.smtp.password=your-app-password

# ============================================================
# FILE STORAGE
# ============================================================
storage.base.path=./uploads
storage.max.file.size.mb=10
storage.allowed.types=pdf,jpg,jpeg,png,doc,docx,xls,xlsx

# ============================================================
# REPORTS
# ============================================================
reports.output.path=./reports
reports.logo.path=classpath:images/logo.png
