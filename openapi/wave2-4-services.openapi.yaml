  # ─── Parent Portal ──────────────────────────────────────────────────
  /api/v1/parent/students:
    get:
      tags: [Parent Portal]
      summary: List students linked to the authenticated parent
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      responses:
        '200':
          description: Parent's students
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /api/v1/parent/students/{studentId}/dashboard:
    get:
      tags: [Parent Portal]
      summary: Get student dashboard for parent view
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: studentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Student dashboard
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /api/v1/parent/students/{studentId}/report-cards:
    get:
      tags: [Parent Portal]
      summary: Get report cards for a student (parent view)
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: studentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Student report cards
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    TenantHeader:
      name: X-Tenant-Id
      in: header
      required: true
      schema:
        type: string
        format: uuid
      description: Tenant UUID for multi-tenant routing

  responses:
    Unauthorized:
      description: Missing or invalid authentication token

  schemas:
    ApiResponse:
      type: object
      properties:
        data:
          type: object
        meta:
          type: object
          properties:
            request_id:
              type: string
              format: uuid
            version:
              type: string
        errors:
          type: array
          items:
            type: object

    # ─── CBC ──────────────────────────────────────────────────────────
    CreateLearningAreaRequest:
      type: object
      required: [school_id, code, name, grade_band]
      properties:
        school_id:
          type: string
          format: uuid
        code:
          type: string
        name:
          type: string
        grade_band:
          type: string
          enum: [LOWER_PRIMARY, UPPER_PRIMARY, JSS, SS]

    CreateStrandRequest:
      type: object
      required: [learning_area_id, code, name]
      properties:
        learning_area_id:
          type: string
          format: uuid
        code:
          type: string
        name:
          type: string

    CreateSubStrandRequest:
      type: object
      required: [strand_id, code, name]
      properties:
        strand_id:
          type: string
          format: uuid
        code:
          type: string
        name:
          type: string

    CreateLearningOutcomeRequest:
      type: object
      required: [sub_strand_id, code, description]
      properties:
        sub_strand_id:
          type: string
          format: uuid
        code:
          type: string
        description:
          type: string

    CreateCompetencyRequest:
      type: object
      required: [school_id, name, code]
      properties:
        school_id:
          type: string
          format: uuid
        name:
          type: string
        code:
          type: string
        description:
          type: string

    # ─── Assessments ──────────────────────────────────────────────────
    CreateAssessmentPlanRequest:
      type: object
      required: [school_id, term_id, class_stream_id, name]
      properties:
        school_id:
          type: string
          format: uuid
        term_id:
          type: string
          format: uuid
        class_stream_id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string

    CreateAssessmentActivityRequest:
      type: object
      required: [assessment_plan_id, subject_id, title, activity_type]
      properties:
        assessment_plan_id:
          type: string
          format: uuid
        subject_id:
          type: string
          format: uuid
        title:
