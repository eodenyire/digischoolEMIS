openapi: 3.0.3
info:
  title: digischoolEMIS Wave 2-4 API
  version: 1.0.0
  description: |
    Wave 2-4 contracts for the digischoolEMIS platform.

    **Wave 2**: CBC Competency Assessment, Assessment Plans & Scores, Parent Portal
    **Wave 3**: Finance (Fee Structures, Payments), Timetable, Teacher Management, LMS (Courses, Assignments), Analytics
    **Wave 4**: Discipline, Health (Clinic Visits), Library, Transport, Boarding

servers:
  - url: https://api.digischoolemis.example.com
security:
  - bearerAuth: []
tags:
  - name: CBC
  - name: Assessments
  - name: Finance
  - name: Timetable
  - name: Teachers
  - name: LMS
  - name: Analytics
  - name: Discipline
  - name: Health
  - name: Library
  - name: Transport
  - name: Boarding
  - name: Parent Portal

paths:
  # ─── CBC ────────────────────────────────────────────────────────────
  /api/v1/cbc/learning-areas:
    post:
      tags: [CBC]
      summary: Create a CBC learning area
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLearningAreaRequest'
      responses:
        '200':
          description: Created learning area
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/cbc/strands:
    post:
      tags: [CBC]
      summary: Create a CBC strand
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateStrandRequest'
      responses:
        '200':
          description: Created strand
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /api/v1/cbc/sub-strands:
    post:
      tags: [CBC]
      summary: Create a CBC sub-strand
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSubStrandRequest'
      responses:
        '200':
          description: Created sub-strand
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /api/v1/cbc/outcomes:
    post:
      tags: [CBC]
      summary: Create a CBC learning outcome
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLearningOutcomeRequest'
      responses:
        '200':
          description: Created learning outcome
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /api/v1/cbc/competencies:
    post:
      tags: [CBC]
      summary: Create a CBC competency
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCompetencyRequest'
      responses:
        '200':
          description: Created competency
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  # ─── Assessments ────────────────────────────────────────────────────
  /api/v1/assessments/plans:
    post:
      tags: [Assessments]
      summary: Create an assessment plan
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAssessmentPlanRequest'
      responses:
        '200':
          description: Created assessment plan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /api/v1/assessments/activities:
    post:
      tags: [Assessments]
      summary: Create an assessment activity
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAssessmentActivityRequest'
      responses:
        '200':
          description: Created assessment activity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /api/v1/assessments/scores:
    post:
      tags: [Assessments]
      summary: Record an assessment score
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAssessmentScoreRequest'
      responses:
        '200':
          description: Recorded assessment score
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /api/v1/report-cards/publish:
    post:
      tags: [Assessments]
      summary: Publish report cards for a class stream
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublishReportCardRequest'
      responses:
        '200':
          description: Report card generation queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /api/v1/report-cards/students/{studentId}:
    get:
      tags: [Assessments]
      summary: Get report cards for a student
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: studentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of report cards
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  # ─── Finance ────────────────────────────────────────────────────────
  /api/v1/finance/fee-structures:
    post:
      tags: [Finance]
      summary: Create a fee structure
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFeeStructureRequest'
      responses:
        '200':
          description: Created fee structure
          content:
