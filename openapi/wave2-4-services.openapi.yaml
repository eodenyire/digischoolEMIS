  /api/v1/discipline/students/{studentId}:
    get:
      tags: [Discipline]
      summary: Get discipline history for a student
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: studentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
