  /api/v1/assignments/{assignmentId}/submissions:
    post:
      tags: [LMS]
      summary: Submit a course assignment
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: assignmentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSubmissionRequest'
      responses:
        '200':
          description: Submission received
          content:
            application/json:
              schema:
