                $ref: '#/components/schemas/ApiResponse'

  /api/v1/finance/invoices:
    post:
      tags: [Finance]
      summary: Create a student invoice
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
